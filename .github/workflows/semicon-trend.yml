name: 半导体设备趋势日报

on:
  schedule:
    - cron: '30 8 * * 1-5'  # 北京时间 16:30 (08:30 UTC), 工作日
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install yfinance pyyaml
      - run: python scripts/semicon_trend.py
      - run: |
          git config user.name bot && git config user.email bot@report
          git pull --rebase origin main || true
          git add docs/data/trend/ 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "半导体设备趋势 $(date '+%Y-%m-%d')" && git push || true)
