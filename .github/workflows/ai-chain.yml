name: AI产业链趋势日报

on:
  schedule:
    - cron: '35 8 * * 1-5'  # 北京时间 16:35 (08:35 UTC), 工作日
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install yfinance pyyaml
      - run: python scripts/ai_chain.py
      - run: |
          git config user.name bot && git config user.email bot@report
          git pull --rebase origin main || true
          git add docs/data/ai_chain/ 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "AI产业链趋势 $(date '+%Y-%m-%d')" && git push || true)
